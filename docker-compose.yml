services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sousa
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: betatester
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sousa -d betatester"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      DATABASE_URL: postgres://sousa:${POSTGRES_PASSWORD:-changeme}@db:5432/betatester
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
