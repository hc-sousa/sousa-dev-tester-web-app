<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Sousa Dev - Testers Network</title>
  <meta name="robots" content="noindex, nofollow, noarchive">
  <meta name="theme-color" content="#060a10">
  <link rel="icon" href="https://sousadev.com/assets/favicon/apple-touch-icon.png">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .login-card {
      max-width: 420px;
    }
    .login-card h1 {
      font-size: 1.5rem;
    }
    .login-error {
      background: rgba(220, 53, 69, 0.12);
      border: 1px solid rgba(220, 53, 69, 0.3);
      color: #f87171;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
    }
    .login-error.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="page-wrapper">

    <header class="site-header">
      <a href="https://sousadev.com" target="_blank" class="logo-link">
        <img src="https://sousadev.com/assets/images/logo.png" alt="Sousa Dev - Testers Network logo">
        <span class="brand-name">Sousa Dev - Testers Network</span>
      </a>
      <div class="header-badge">Admin</div>
    </header>

    <div class="container">
      <div class="card login-card">
        <h1>Admin <span style="color: var(--green);">Login</span></h1>
        <p class="subtitle">Enter the admin password to access the dashboard.</p>

        <div class="login-error {{ERROR_CLASS}}">{{ERROR_MSG}}</div>

        <form method="POST" action="/admin/login">
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter admin password" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn-primary" style="width:100%">Sign In</button>
        </form>
      </div>
    </div>

    <footer class="site-footer">
      &copy; 2026 <a href="https://sousadev.com" target="_blank">Sousa Dev - Testers Network</a> &middot; IT Solutions
    </footer>

  </div>
</body>
</html>
